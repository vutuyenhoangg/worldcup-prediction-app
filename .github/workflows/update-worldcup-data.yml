name: Update World Cup Data

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  update-worldcup-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas requests sqlalchemy psycopg2-binary toml

      - name: Run World Cup data crawler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_TO_SUPABASE: "true"
        run: |
          python crawl_wc_data.py
